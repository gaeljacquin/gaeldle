packages:
  - 'apps/*'
  - 'packages/*'
allowBuilds:
  '@nestjs/core': true
  esbuild: true
  msw: true
  sharp: true
  unrs-resolver: true
engineStrict: true
minimumReleaseAgeExclude:
  - '@turbo/darwin-64@2.9.16 || 2.9.17 || 2.10.0'
  - '@turbo/darwin-arm64@2.9.16 || 2.9.17 || 2.10.0'
  - '@turbo/linux-64@2.9.16 || 2.9.17 || 2.10.0'
  - '@turbo/linux-arm64@2.9.16 || 2.9.17 || 2.10.0'
  - '@turbo/windows-64@2.9.16 || 2.9.17 || 2.10.0'
  - '@turbo/windows-arm64@2.9.16 || 2.9.17 || 2.10.0'
  - turbo@2.9.16 || 2.9.17 || 2.10.0
  - '@turbo/gen@2.9.17 || 2.10.0'
